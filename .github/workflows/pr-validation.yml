name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      ['src/**', 'data/**', '.github/workflows/pr-validation.yml', 'package.json', 'pnpm-lock.yaml']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup
        uses: ./.github/actions/setup-pnpm
        with:
          checkout: 'false'

      - name: Check formatting
        run: pnpm format:check

      - name: Run oxlint
        run: pnpm exec oxlint src --type-aware --format=github

      - name: Cache TypeScript build
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            built
            .tsbuildinfo
          key: ${{ runner.os }}-ts-build-${{ hashFiles('src/**/*.ts', 'tsconfig.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-ts-build-

      - name: Generate Data
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: pnpm generate-data

      - name: Check for changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: data
        with:
          base: HEAD
          filters: |
            changed:
              - '**'

      - name: Fail if data not generated
        if: steps.data.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            core.setFailed('Generated data is out of date. Please run `pnpm generate-data` and commit the changes.')
